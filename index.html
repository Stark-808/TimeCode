<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pro Stage Timer Console</title>

<!-- Digital-7 Mono Font -->
<link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
<!-- MQTT.js -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
    :root {
        --bg-color: #000000;
        --panel-bg: #0a0a0a;
        --border-color: #333333;
        --text-main: #ffffff;
        --text-muted: #888888;
        --accent-green: #00cc00;
        --accent-red: #ff3333;
        --accent-yellow: #ffcc00;
        --border-rad: 6px; 
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0; padding: 0;
        overflow: hidden; 
        display: flex; flex-direction: column;
        height: 100vh; width: 100vw;
    }

    button, input, select, textarea {
        font-family: inherit;
        border-radius: var(--border-rad); 
        outline: none;
    }

    button { cursor: pointer; transition: 0.1s; }
    button:active { transform: scale(0.96); }

    /* === 1. Welcome Screen === */
    #role-screen {
        position: fixed; inset: 0; background: var(--bg-color); z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #role-screen h1 { font-size: 2.5rem; color: var(--text-main); letter-spacing: 2px; }
    .btn-square {
        background: transparent; color: var(--text-main); border: 1px solid var(--border-color);
        padding: 6px 12px; font-size: 0.85rem;
        display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .btn-square:hover { border-color: var(--text-main); background: #111; }
    
    .role-input {
        background: #111; border: 1px solid var(--border-color); color: #fff;
        padding: 10px; font-size: 1.2rem; text-align: center; width: 250px; margin-bottom: 20px;
    }

    /* === 2. Rooms Lobby === */
    #rooms-view { display: none; flex-direction: column; height: 100vh; padding: 20px; overflow-y: auto; background: var(--bg-color); }
    .rooms-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px; }
    .rooms-header h2 { margin: 0; font-size: 1.8rem; font-weight: normal; }

    .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
    .room-card {
        background: var(--panel-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: var(--border-rad);
        display: flex; flex-direction: column; gap: 10px; position: relative;
    }
    .room-card.pinned { border-color: var(--accent-yellow); }
    .room-card h3 { margin: 0; font-size: 1.4rem; }
    .room-stats { font-size: 0.85rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px;}
    .room-actions { display: flex; gap: 10px; margin-top: 10px; }

    /* Modals */
    .modal-overlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000;
        align-items: center; justify-content: center;
    }
    .modal-box { background: #111; border: 1px solid #444; padding: 20px; width: 350px; display: flex; flex-direction: column; gap: 15px; border-radius: var(--border-rad); box-shadow: 0 10px 30px rgba(0,0,0,0.8);}
    .modal-box h3 { margin: 0 0 10px 0; font-weight: normal; }
    .modal-box input, .modal-box select { background: #000; border: 1px solid #333; color: #fff; padding: 8px; font-size: 1rem; width: 100%;}
    .modal-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }

    /* === 3. Console Dashboard === */
    #console-view { display: none; flex-direction: column; height: 100vh; }
    .console-header {
        height: 50px; background: #050505; border-bottom: 1px solid var(--border-color);
        display: flex; align-items: center; padding: 0 20px; justify-content: space-between; flex-shrink: 0;
    }
    .console-header .room-info { font-size: 1.1rem; color: var(--text-muted); }
    
    .workspace { display: flex; flex: 1; overflow: hidden; width: 100%; }
    .panel { display: flex; flex-direction: column; background: var(--panel-bg); overflow: hidden; }
    
    /* Unified Header */
    .panel-header { 
        padding: 15px 15px 5px 15px; background: var(--panel-bg); 
        font-weight: normal; font-size: 1.1rem; color: #ccc; flex-shrink: 0;
        display: flex; justify-content: space-between; align-items: center;
    }
    .panel-content { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    
    .resizer { width: 6px; background: #111; cursor: col-resize; flex-shrink: 0; transition: background 0.2s; border-left: 1px solid #000; border-right: 1px solid #000; }
    .resizer:hover, .resizer.dragging { background: var(--text-muted); }

    .dropdown { position: relative; display: inline-block; }
    .dropdown-menu { 
        display: none; position: absolute; right: 0; top: 100%; margin-top: 5px;
        background: #111; border: 1px solid var(--border-color); z-index: 100; border-radius: var(--border-rad);
        flex-direction: column; min-width: 100px; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
    }
    .dropdown-menu.show { display: flex; }
    .dropdown-menu button { background: transparent; border: none; color: #ccc; padding: 8px 15px; text-align: left; font-size: 0.85rem; border-radius: 0; }
    .dropdown-menu button:hover { background: #333; color: #fff; }

    /* LED */
    .led { width: 10px; height: 10px; border-radius: 50%; background: #333; border: 1px solid #111; transition: 0.2s; }
    .led.active { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); border-color: #fff; }

    /* === Left Panel (Dashboard) 1/6 === */
    #panel-left { width: 16.66%; min-width: 250px; }
    .preview-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid var(--border-color); border-radius: var(--border-rad); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .preview-scale-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; transform-origin: center; width: max-content; }
    
    .preview-time { font-family: 'Digital-7 Mono', monospace; font-size: 5rem; color: var(--accent-green); line-height: 0.9; text-align: center; white-space: pre-wrap; text-shadow: none !important; letter-spacing: -2px;}
    .preview-time.warning-text { color: var(--accent-yellow) !important; }
    .preview-time.danger-text { color: var(--accent-red) !important; }
    .sub-time { font-size: 0.25em; color: inherit; display: block; margin-top: 2px; }

    .preview-msg { font-size: 1rem; color: #fff; font-weight: normal; text-align: center; margin-top: 5px; transition: opacity 0.2s; }
    .preview-msg.msg-fullscreen { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; font-size: 2rem; z-index: 5; }
    
    /* Segmented Progress Bar (Left to Right Depletion) */
    .prog-container { width: 100%; height: 25px; background: #111; border-radius: var(--border-rad); position: relative; margin-top: 5px; overflow: hidden;}
    .prog-bg { position: absolute; inset: 0; }
    .prog-fill { position: absolute; top: 0; bottom: 0; left: 0; background: rgba(0,0,0,0.85); transition: width 0.1s linear;}
    .prog-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: #fff; transform: translateX(-50%); z-index: 2;}
    .prog-marker-time { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 2px 4px; border-radius: 2px; font-size: 0.7rem; font-weight: bold; margin-bottom: 2px; white-space: nowrap;}

    /* Quick Controls Symmetrical & Uniform */
    .quick-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; gap: 5px; flex-wrap: nowrap; width: 100%;}
    .qc-item {
        flex: 1; height: 36px; background: #111; border: 1px solid #444; color: #fff; 
        padding: 0; font-size: 0.95rem; border-radius: var(--border-rad); cursor: pointer; 
        display: flex; align-items: center; justify-content: center; text-align: center;
        min-width: 0;
    }
    select.qc-item { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    .qc-item:hover { background: #333; }
    .qc-btn-play { color: var(--accent-green); font-size: 1.1rem; }
    .qc-btn-pause { color: var(--accent-red); font-size: 1.1rem; }

    .client-list { font-size: 0.85rem; color: #aaa; border-top: 1px solid #333; padding-top: 10px; margin-top: 10px; flex: 1; overflow-y: auto;}

    /* === Middle Panel (Timers) 3/6 === */
    #panel-mid { width: 50%; min-width: 350px; }
    .timer-item { background: #222222; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-radius: var(--border-rad); border: 1px solid #333; transition: 0.2s; margin-bottom: 5px;}
    .timer-item.active-running { border: 1px solid #666; background: #2a2a2a; }
    
    .t-name { font-size: 1rem; background: transparent; color: #fff; border: none; outline: none; width: 100%; padding: 4px; border-bottom: 1px solid transparent; transition: 0.2s;}
    .t-name:focus { border-bottom: 1px solid #555; }
    
    .t-time-display { font-family: 'Digital-7 Mono', monospace; font-size: 1.8rem; color: var(--accent-green); cursor: pointer; padding: 0 10px; min-width: 80px; text-align: center; transition: 0.2s;}
    .t-time-display:hover { color: #fff; }
    
    .t-actions { display: flex; gap: 8px; align-items: center;}

    /* Timer Settings Modal Elements */
    .ts-row-modal { display: flex; align-items: center; gap: 10px; justify-content: space-between; margin-bottom: 12px;}
    .ts-row-modal input[type="number"] { width: 60px; text-align: center; }

    /* === Right Panel (Messages) 2/6 === */
    #panel-right { width: 33.33%; min-width: 300px; }
    .msg-item { background: #222222; padding: 15px; display: flex; flex-direction: column; gap: 8px; border-radius: var(--border-rad); border: 1px solid #333; margin-bottom: 5px;}
    .msg-input { width: 100%; resize: vertical; min-height: 40px; font-size: 0.95rem; color: #fff; padding: 0; background: transparent; border: none; outline: none; border-bottom: 1px solid transparent;}
    .msg-input:focus { border-bottom: 1px solid #555; }
    
    .msg-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 5px;}
    .msg-styles { display: flex; gap: 4px; align-items: center; }
    .style-btn { width: 24px; height: 24px; background: #111; border: 1px solid transparent; color: #aaa; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; border-radius: 4px;}
    .style-btn.on { background: #333; color: #fff; border-color: #555; }
    .color-btn { width: 16px; height: 16px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
    .color-btn[data-c="white"] { background: #ffffff; }
    .color-btn[data-c="green"] { background: var(--accent-green); }
    .color-btn[data-c="red"] { background: var(--accent-red); }
    .color-btn.selected { border-color: #888; transform: scale(1.2); }
    
    .msg-controls { display: flex; gap: 5px; align-items: center; }
    .msg-mode-select { background: #111; border: 1px solid #333; color: #fff; padding: 3px 6px; font-size: 0.75rem; border-radius: var(--border-rad); width: auto;}
    .btn-show { border-color: #444; color: #aaa; padding: 3px 12px; font-size: 0.8rem; font-weight: bold;}
    .btn-show.showing { border-color: var(--accent-red); color: var(--accent-red); }

    .add-block-btn { width: 100%; border: 1px dashed #444; color: #888; padding: 10px; background: transparent; font-size: 0.9rem; border-radius: var(--border-rad); transition: 0.2s; margin-top: 5px;}
    .add-block-btn:hover { border-color: #fff; color: #fff; background: #111; }

    /* Flash Animation scoped to specific elements */
    .flash-alert { animation: flashAlertAnim 0.15s 6 alternate ease-in-out; }
    @keyframes flashAlertAnim {
        0% { filter: invert(0); }
        100% { filter: invert(1); }
    }

    /* === 4. Slave Display === */
    #slave-view { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; background: #000; position: relative; overflow: hidden; }
    .slave-code-input { position: absolute; z-index: 100; display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .slave-code-input input { font-size: 2rem; padding: 10px; text-align: center; width: 200px; background: #111; color: var(--text-main); border: 2px solid #333; border-radius: var(--border-rad);}
    
    #slave-content { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    .slave-stretch { display: flex; flex-direction: column; align-items: center; justify-content: center; transform-origin: center; width: max-content; }
    
    .slave-time { font-family: 'Digital-7 Mono', monospace; font-size: 25rem; color: var(--accent-green); line-height: 0.9; white-space: pre-wrap; transition: color 0.3s; text-align: center; text-shadow: none !important; letter-spacing: -5px;}
    .slave-time.warning-text { color: var(--accent-yellow) !important; }
    .slave-time.danger-text { color: var(--accent-red) !important; }

    .slave-msg-bottom { font-size: 5rem; color: #fff; font-weight: normal; text-align: center; margin-top: 20px; white-space: pre-wrap; line-height: 1.2; display: none; transition: opacity 0.2s;}
    .slave-msg-fs { position: absolute; inset: 0; background: #000; display: none; align-items: center; justify-content: center; font-size: 10rem; color: #fff; font-weight: normal; text-align: center; z-index: 50; white-space: pre-wrap; line-height: 1.2; padding: 50px; transition: opacity 0.2s;}
    
    .slave-prog-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; background: #111; z-index: 60;}
    .slave-prog-bg { position: absolute; inset: 0; }
    .slave-prog-fill { position: absolute; top:0; left:0; bottom:0; background: rgba(0,0,0,0.85); transition: width 0.1s linear; }

    @media (max-width: 1024px) {
        .workspace { flex-direction: column; overflow-y: auto; }
        .resizer { display: none; }
        #panel-left, #panel-mid, #panel-right { width: 100% !important; min-height: 400px; flex: none; border-bottom: 5px solid #222; }
    }
</style>
</head>
<body>

    <!-- Role Selection -->
    <div id="role-screen">
        <h1>PRO STAGE TIMER</h1>
        <input type="text" id="my-name-input" class="role-input" placeholder="Device Name">
        <div style="display: flex; gap: 20px;">
            <button class="btn-square" onclick="initApp('master')">CONSOLE (MASTER)</button>
            <button class="btn-square" onclick="initApp('slave')">DISPLAY (SLAVE)</button>
        </div>
    </div>

    <!-- Master: Rooms Lobby -->
    <div id="rooms-view">
        <div class="rooms-header">
            <h2 style="color:#fff;">Rooms (<span id="rooms-count">0</span>)</h2>
            <button class="btn-square btn-create" onclick="openCreateRoomModal()">+ Create Room</button>
        </div>
        <div class="rooms-grid" id="rooms-grid"></div>
    </div>

    <!-- Modal: Create Room -->
    <div class="modal-overlay" id="create-room-modal">
        <div class="modal-box">
            <h3>Create New Room</h3>
            <input type="text" id="new-room-name" placeholder="Room Name (e.g., Main Hall)">
            <input type="text" id="new-room-code" placeholder="5-Digit Code" maxlength="5">
            <div class="modal-btns">
                <button class="btn-square" style="border-color:#555; color:#aaa;" onclick="closeModal('create-room-modal')">Cancel</button>
                <button class="btn-square" style="border-color:var(--accent-green); color:var(--accent-green);" onclick="confirmCreateRoom()">Create</button>
            </div>
        </div>
    </div>

    <!-- Modal: Timer Settings -->
    <div class="modal-overlay" id="timer-settings-modal">
        <div class="modal-box" style="width: 380px;">
            <h3>Timer Settings</h3>
            <div class="ts-row-modal">
                <label style="color:#fff;">Duration:</label>
                <div>
                    <input type="number" id="ts-m" min="0" placeholder="Min"> :
                    <input type="number" id="ts-s" min="0" max="59" placeholder="Sec">
                </div>
            </div>
            <div class="ts-row-modal">
                <label style="color:#fff;">Appearance:</label>
                <select id="ts-appr" style="width: 140px;">
                    <option value="cd">Countdown</option>
                    <option value="cu">Count Up</option>
                    <option value="tod">Time of Day</option>
                    <option value="cd_tod">C/D + ToD</option>
                    <option value="cu_tod">C/U + ToD</option>
                    <option value="tc">Timecode</option>
                    <option value="hidden">Hidden</option>
                </select>
            </div>
            <div class="ts-row-modal">
                <label style="color:#fff;">TC Format:</label>
                <select id="ts-fps" style="width: 140px;">
                    <option value="24">24 FPS</option>
                    <option value="25">25 FPS</option>
                    <option value="29.97">29.97 DF</option>
                    <option value="30">30 NDF</option>
                </select>
            </div>
            <div class="ts-row-modal">
                <label style="color:#fff;">🟡 Yellow At:</label>
                <div>
                    <input type="number" id="ts-ym" min="0" placeholder="Min"> m
                    <input type="number" id="ts-ys" min="0" max="59" placeholder="Sec"> s
                </div>
            </div>
            <div class="ts-row-modal">
                <label style="color:#fff;">🔴 Red At:</label>
                <div>
                    <input type="number" id="ts-rm" min="0" placeholder="Min"> m
                    <input type="number" id="ts-rs" min="0" max="59" placeholder="Sec"> s
                </div>
            </div>
            <div class="modal-btns" style="margin-top: 20px;">
                <button class="btn-square" style="background:#000; color:#fff; border:1px solid #555;" onclick="closeModal('timer-settings-modal')">Cancel</button>
                <button class="btn-square" style="background:var(--accent-green); color:#fff; border:none;" onclick="saveTimerSettings()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Master: Console Workspace -->
    <div id="console-view">
        <div class="console-header">
            <button class="btn-square" style="border:none; color:#ccc;" onclick="exitRoom()">← Back</button>
            <div class="room-info" id="console-room-info">ROOM: UNKNOWN </div>
            <button class="btn-square" style="border:1px solid #555; color:#888; font-size:0.75rem;" id="global-fs-btn">[ FULLSCREEN ]</button>
        </div>
        
        <div class="workspace" id="workspace">
            <!-- Left: Dashboard (1/6) -->
            <div class="panel" id="panel-left">
                <div class="panel-header">Dashboard</div>
                <div class="panel-content">
                    <div class="preview-box" id="master-preview-box">
                        <div class="preview-scale-wrapper" id="master-preview-scale">
                            <div class="preview-time" id="m-prev-time">00:00</div>
                            <div class="preview-msg" id="m-prev-msg-bot" style="display:none;"></div>
                        </div>
                        <div class="preview-msg msg-fullscreen" id="m-prev-msg-fs" style="display:none;"></div>
                    </div>
                    
                    <div class="prog-container" id="m-prog-container">
                        <div class="prog-bg" id="m-prog-bg"></div>
                        <div class="prog-fill" id="m-prog-fill"></div>
                        <div class="prog-marker" id="m-prog-marker" style="display:none;">
                            <div class="prog-marker-time" id="m-prog-marker-time">00:00</div>
                        </div>
                    </div>
                    
                    <div class="quick-controls">
                        <select class="qc-item" id="qc-step-l" onchange="syncQcStep('l')">
                            <option value="1000">1s</option>
                            <option value="10000">10s</option>
                            <option value="30000">30s</option>
                            <option value="60000" selected>1m</option>
                            <option value="300000">5m</option>
                            <option value="600000">10m</option>
                            <option value="1200000">20m</option>
                            <option value="1800000">30m</option>
                        </select>
                        <button class="qc-item" id="btn-qc-minus" onclick="qcAdjust(-1)">-</button>
                        <button class="qc-item" onclick="qcPrev()">|◀</button>
                        <button class="qc-item qc-btn-play" id="btn-qc-playpause" onclick="qcPlayPause()">▶</button>
                        <button class="qc-item" onclick="qcNext()">▶|</button>
                        <button class="qc-item" id="btn-qc-plus" onclick="qcAdjust(1)">+</button>
                        <select class="qc-item" id="qc-step-r" onchange="syncQcStep('r')">
                            <option value="1000">1s</option>
                            <option value="10000">10s</option>
                            <option value="30000">30s</option>
                            <option value="60000" selected>1m</option>
                            <option value="300000">5m</option>
                            <option value="600000">10m</option>
                            <option value="1200000">20m</option>
                            <option value="1800000">30m</option>
                        </select>
                    </div>

                    <div class="client-list">
                        <div style="color:#fff; margin-bottom:5px; font-weight:normal;">Connected Displays: <span id="m-client-count">0</span></div>
                        <div id="m-client-list"></div>
                    </div>
                </div>
            </div>
            
            <div class="resizer" id="resizer-lm"></div>

            <!-- Mid: Timers (3/6) -->
            <div class="panel" id="panel-mid">
                <div class="panel-header">
                    <span>Timers</span>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-square" style="border-color:#555; padding:2px 8px; font-size:0.8rem;" onclick="toggleBlackout()"><div class="led" id="led-blackout" style="margin-right:5px;"></div> Blackout</button>
                        <button class="btn-square" style="border-color:#555; padding:2px 8px; font-size:0.8rem;" onclick="triggerFlash()">Flash</button>
                    </div>
                </div>
                <div class="panel-content" id="timers-content">
                    <div id="timers-list" style="display:flex; flex-direction:column;"></div>
                    <button class="add-block-btn" onclick="addTimer()">+ Add Timer</button>
                </div>
            </div>

            <div class="resizer" id="resizer-mr"></div>

            <!-- Right: Messages (2/6) -->
            <div class="panel" id="panel-right">
                <div class="panel-header">
                    <span>Messages</span>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-square" style="border-color:#555; padding:2px 8px; font-size:0.8rem;" onclick="triggerFlash()">Flash</button>
                    </div>
                </div>
                <div class="panel-content" id="messages-content">
                    <div id="messages-list" style="display:flex; flex-direction:column;"></div>
                    <button class="add-block-btn" onclick="addMessage()">+ Add Message</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Slave View -->
    <div id="slave-view">
        <div class="slave-code-input" id="slave-login">
            <h2 style="color:#fff; font-weight:normal;">ENTER ROOM CODE</h2>
            <input type="text" id="slave-room-code" maxlength="5" placeholder="12345">
            <button class="btn-square btn-open" onclick="slaveConnect()">CONNECT</button>
        </div>
        <div id="slave-content">
            <div class="slave-stretch" id="slave-stretch">
                <div class="slave-time" id="s-time">00:00</div>
                <div class="slave-msg-bottom" id="s-msg-bot"></div>
            </div>
            <div class="slave-msg-fs" id="s-msg-fs"></div>
            <div class="slave-prog-container">
                <div class="slave-prog-bg" id="s-prog-bg"></div>
                <div class="slave-prog-fill" id="s-prog-fill"></div>
            </div>
        </div>
    </div>

<script>
    let isMaster = true;
    let myName = 'Unknown';
    const myId = 'dev_' + Math.random().toString(36).substr(2, 6);
    
    const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt'; 
    let mqttClient = null;
    let activeRoomCode = '';
    let heartbeatInt = null;
    let connectedClients = {};

    let cdIsRunning = false;
    let cdTargetTime = 0;
    let cdRemainingMs = 0;
    let cdTotalMs = 0;
    let clockOffset = 0; 

    let sysBlackout = false;
    let lastFlashTs = 0;

    let rooms = [];
    let currentRoom = null;
    let activeTimerIndex = -1; 
    let activeMessageId = null; 
    let editingTimerId = null;

    function pad(num, size = 2) { return num.toString().padStart(size, '0'); }

    function initApp(role) {
        let n = document.getElementById('my-name-input').value.trim();
        myName = n !== '' ? n : (role === 'master' ? 'Console-' : 'Disp-') + myId.substr(4).toUpperCase();
        isMaster = (role === 'master');
        
        document.getElementById('role-screen').style.display = 'none';
        
        if (isMaster) {
            document.getElementById('rooms-view').style.display = 'flex';
            loadRooms(); renderRooms(); setupResizers(); updateQcText();
        } else {
            document.getElementById('slave-view').style.display = 'flex';
        }
        
        if(mqttClient) mqttClient.end();
        mqttClient = mqtt.connect(MQTT_BROKER);
        mqttClient.on('message', handleMqttMessage);
    }

    function loadRooms() {
        let saved = localStorage.getItem('matc_rooms_v6');
        if (saved) { try { rooms = JSON.parse(saved); } catch(e) { rooms = []; } }
    }
    function saveRooms() { if(isMaster) localStorage.setItem('matc_rooms_v6', JSON.stringify(rooms)); }
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 4); }

    function openCreateRoomModal() {
        document.getElementById('new-room-name').value = '';
        document.getElementById('new-room-code').value = Math.floor(10000 + Math.random() * 90000).toString();
        document.getElementById('create-room-modal').style.display = 'flex';
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function confirmCreateRoom() {
        let name = document.getElementById('new-room-name').value.trim() || 'New Room';
        let code = document.getElementById('new-room-code').value.trim();
        if(code.length !== 5) return;
        
        let newRoom = { id: generateId(), name: name, code: code, isPinned: false, timers: [], messages: [] };
        rooms.push(newRoom); saveRooms(); renderRooms(); closeModal('create-room-modal');
    }

    function renderRooms() {
        let grid = document.getElementById('rooms-grid');
        grid.innerHTML = '';
        rooms.sort((a, b) => (b.isPinned === a.isPinned) ? 0 : b.isPinned ? 1 : -1);
        document.getElementById('rooms-count').textContent = rooms.length;

        rooms.forEach(r => {
            let card = document.createElement('div');
            card.className = 'room-card' + (r.isPinned ? ' pinned' : '');
            card.innerHTML = `
                <h3>${r.name}</h3>
                <div class="room-stats">
                    <span>Code: <b style="color:var(--accent-yellow); font-size:1.1rem;">${r.code}</b></span>
                    <span>Timers: ${r.timers.length} | Msgs: ${r.messages.length}</span>
                </div>
                <div class="room-actions">
                    <button class="btn-square btn-open" onclick="openRoom('${r.id}')">OPEN</button>
                    <div class="dropdown">
                        <button class="btn-square" onclick="toggleDropdown('rmenu-${r.id}')">⋮</button>
                        <div class="dropdown-menu" id="rmenu-${r.id}">
                            <button onclick="pinRoom('${r.id}')">${r.isPinned ? 'Unpin' : 'Pin to top'}</button>
                            <button onclick="dupRoom('${r.id}')">Clone</button>
                            <button onclick="delRoom('${r.id}')" style="color:var(--accent-red);">Delete</button>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function toggleDropdown(id) {
        let el = document.getElementById(id);
        let isShowing = el.classList.contains('show');
        document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show'));
        if(!isShowing) el.classList.add('show');
    }
    
    function pinRoom(id) { let r = rooms.find(x=>x.id===id); if(r) r.isPinned = !r.isPinned; saveRooms(); renderRooms(); }
    function delRoom(id) { if(confirm('Delete?')) { rooms = rooms.filter(x=>x.id!==id); saveRooms(); renderRooms(); } }
    function dupRoom(id) { 
        let r = rooms.find(x=>x.id===id); 
        if(r) { 
            let nr = JSON.parse(JSON.stringify(r)); 
            nr.id = generateId(); nr.name += ' (Copy)'; nr.code = Math.floor(10000 + Math.random() * 90000).toString();
            nr.isPinned = false; nr.messages.forEach(m => m.show = false);
            rooms.push(nr); saveRooms(); renderRooms(); 
        } 
    }

    function openRoom(id) {
        currentRoom = rooms.find(x=>x.id===id);
        if(!currentRoom) return;

        document.getElementById('rooms-view').style.display = 'none';
        document.getElementById('console-view').style.display = 'flex';
        document.getElementById('console-room-info').textContent = `ROOM: ${currentRoom.name} [${currentRoom.code}]`;
        
        activeRoomCode = currentRoom.code;
        connectedClients = {}; renderClientList();

        mqttClient.unsubscribe(/.*/);
        mqttClient.subscribe(`matc/v6/room_${activeRoomCode}/heartbeat`);
        
        cdIsRunning = false; cdRemainingMs = 0; cdTotalMs = 0; activeTimerIndex = -1; activeMessageId = null;
        sysBlackout = false; document.getElementById('led-blackout').className = 'led';
        currentRoom.messages.forEach(m => m.show = false);

        renderTimers(); renderMessages(); updatePlayPauseBtn(); broadcastState();
        if(!window.masterLoop) window.masterLoop = setInterval(broadcastState, 1000);
    }

    function exitRoom() {
        document.getElementById('console-view').style.display = 'none';
        document.getElementById('rooms-view').style.display = 'flex';
        activeRoomCode = '';
        if(window.masterLoop) { clearInterval(window.masterLoop); window.masterLoop = null; }
        saveRooms();
    }

    function toggleBlackout() { sysBlackout = !sysBlackout; document.getElementById('led-blackout').className = 'led' + (sysBlackout?' active':''); broadcastState(); }
    
    function triggerFlash() { lastFlashTs = Date.now(); broadcastState(); playFlashAnimation(); }

    function playFlashAnimation() {
        let pBox = document.getElementById('master-preview-box');
        let sView = document.getElementById('slave-view');
        
        if (pBox) {
            pBox.classList.remove('flash-alert');
            void pBox.offsetWidth; // force reflow
            pBox.classList.add('flash-alert');
        }
        
        if (sView && activeRoomCode) {
            sView.classList.remove('flash-alert');
            void sView.offsetWidth; // force reflow
            sView.classList.add('flash-alert');
        }
    }

    function renderTimers() {
        let list = document.getElementById('timers-list');
        list.innerHTML = '';
        currentRoom.timers.forEach((t, i) => {
            let isActive = (i === activeTimerIndex);
            let div = document.createElement('div');
            div.className = 'timer-item' + (isActive ? ' active-running' : '');
            
            // Format HH:MM:SS or MM:SS
            let durStr = pad(t.m) + ":" + pad(t.s);
            if (t.h > 0) durStr = t.h + ":" + durStr;

            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:12px; flex:1;">
                    <span style="color:#777; font-weight:bold; font-size:1.1rem; width:25px;">#${i+1}</span>
                    <div class="t-time-display" onclick="openTimerSettings('${t.id}')">${durStr}</div>
                    <input type="text" class="t-name" id="t-name-${t.id}" value="${t.name}" placeholder="Timer Name" onchange="updateTimerData('${t.id}')">
                </div>
                <div class="t-actions">
                    <button class="btn-square btn-set" style="border-color:#555;" onclick="setTimer(${i})">SET</button>
                    <button class="btn-square btn-go" style="border-color:var(--accent-green); color:var(--accent-green);" onclick="goTimer(${i})">GO</button>
                    <div class="dropdown">
                        <button class="btn-square" style="border:none; padding:4px 8px;" onclick="toggleDropdown('tmenu-${t.id}')">⋮</button>
                        <div class="dropdown-menu" id="tmenu-${t.id}" style="right:0; width:80px;">
                            <button onclick="cloneTimer('${t.id}')">Clone</button>
                            <button onclick="delTimer('${t.id}')" style="color:var(--accent-red);">Delete</button>
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function addTimer() { currentRoom.timers.push({ id: generateId(), name: '', h: 0, m: 15, s: 0, ym: 5, ys: 0, rm: 1, rs: 0, appr: 'cd', fps: 24, df: false }); saveRooms(); renderTimers(); }
    function updateTimerData(id) { let t = currentRoom.timers.find(x=>x.id===id); if(t) { t.name = document.getElementById('t-name-'+id).value; saveRooms(); } }
    function cloneTimer(id) { let t = currentRoom.timers.find(x=>x.id===id); if(t) { let nt = JSON.parse(JSON.stringify(t)); nt.id = generateId(); nt.name += ' (Copy)'; currentRoom.timers.push(nt); saveRooms(); renderTimers(); } }
    function delTimer(id) { if(confirm("Delete timer?")) { currentRoom.timers = currentRoom.timers.filter(x=>x.id!==id); saveRooms(); renderTimers(); } }

    function openTimerSettings(id) {
        let t = currentRoom.timers.find(x=>x.id===id);
        if(!t) return;
        editingTimerId = id;
        document.getElementById('ts-m').value = t.m; document.getElementById('ts-s').value = t.s;
        document.getElementById('ts-ym').value = t.ym; document.getElementById('ts-ys').value = t.ys;
        document.getElementById('ts-rm').value = t.rm; document.getElementById('ts-rs').value = t.rs;
        document.getElementById('ts-appr').value = t.appr;
        document.getElementById('ts-fps').value = t.df ? '29.97' : t.fps;
        document.getElementById('timer-settings-modal').style.display = 'flex';
    }

    function saveTimerSettings() {
        if(!editingTimerId) return;
        let t = currentRoom.timers.find(x=>x.id===editingTimerId);
        if(t) {
            t.m = parseInt(document.getElementById('ts-m').value)||0; t.s = parseInt(document.getElementById('ts-s').value)||0;
            t.ym = parseInt(document.getElementById('ts-ym').value)||0; t.ys = parseInt(document.getElementById('ts-ys').value)||0;
            t.rm = parseInt(document.getElementById('ts-rm').value)||0; t.rs = parseInt(document.getElementById('ts-rs').value)||0;
            t.appr = document.getElementById('ts-appr').value;
            let fpsV = parseFloat(document.getElementById('ts-fps').value); t.fps = fpsV; t.df = (fpsV === 29.97);
            saveRooms(); closeModal('timer-settings-modal'); renderTimers();
            if(activeTimerIndex >= 0 && currentRoom.timers[activeTimerIndex].id === editingTimerId) setTimer(activeTimerIndex);
        }
    }

    function setTimer(idx) {
        activeTimerIndex = idx;
        let t = currentRoom.timers[idx];
        cdRemainingMs = (t.h * 3600 + t.m * 60 + t.s) * 1000;
        cdTotalMs = cdRemainingMs; cdIsRunning = false;
        renderTimers(); updatePlayPauseBtn(); broadcastState();
    }

    function goTimer(idx) {
        setTimer(idx);
        if(cdRemainingMs > 0 || currentRoom.timers[idx].appr !== 'cd') { 
            cdTargetTime = Date.now() + cdRemainingMs; cdIsRunning = true;
            updatePlayPauseBtn(); broadcastState();
        }
    }

    function renderMessages() {
        let list = document.getElementById('messages-list');
        list.innerHTML = '';
        currentRoom.messages.forEach((m, i) => {
            let div = document.createElement('div');
            div.className = 'msg-item';
            div.innerHTML = `
                <textarea class="msg-input" id="m-txt-${m.id}" onchange="updateMsgText('${m.id}')" placeholder="Enter message here...">${m.text}</textarea>
                <div class="msg-toolbar">
                    <div class="msg-styles">
                        <button class="color-btn ${m.c==='white'?'selected':''}" data-c="white" onclick="setMsgColor('${m.id}','white')"></button>
                        <button class="color-btn ${m.c==='green'?'selected':''}" data-c="green" onclick="setMsgColor('${m.id}','green')"></button>
                        <button class="color-btn ${m.c==='red'?'selected':''}" data-c="red" onclick="setMsgColor('${m.id}','red')"></button>
                        <button class="style-btn ${m.b?'on':''}" style="margin-left:5px;" onclick="toggleMsgStyle('${m.id}','b')">B</button>
                        <button class="style-btn ${m.cap?'on':''}" onclick="toggleMsgStyle('${m.id}','cap')">AA</button>
                    </div>
                    <div class="msg-controls">
                        <select class="msg-mode-select" id="m-mode-${m.id}" onchange="updateMsgMode('${m.id}')">
                            <option value="bottom" ${m.mode==='bottom'?'selected':''}>Bottom</option>
                            <option value="fullscreen" ${m.mode==='fullscreen'?'selected':''}>Fullscreen</option>
                        </select>
                        <button class="btn-square btn-show ${m.show?'showing':''}" onclick="toggleMsgShow('${m.id}')">
                            SHOW
                        </button>
                        <div class="dropdown">
                            <button class="btn-square" style="border:none; padding:4px 8px;" onclick="toggleDropdown('mmenu-${m.id}')">⋮</button>
                            <div class="dropdown-menu" id="mmenu-${m.id}" style="right:0;">
                                <button onclick="cloneMsg('${m.id}')">Clone</button>
                                <button onclick="delMsg('${m.id}')" style="color:var(--accent-red);">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function addMessage() { currentRoom.messages.push({ id: generateId(), text: '', c: 'white', b: false, cap: false, mode: 'bottom', show: false }); saveRooms(); renderMessages(); }
    function updateMsgText(id) { let m = currentRoom.messages.find(x=>x.id===id); if(m) { m.text = document.getElementById('m-txt-'+id).value; saveRooms(); if(m.show) broadcastState(); } }
    function updateMsgMode(id) { let m = currentRoom.messages.find(x=>x.id===id); if(m) { m.mode = document.getElementById('m-mode-'+id).value; saveRooms(); if(m.show) broadcastState(); } }
    function setMsgColor(id, c) { let m = currentRoom.messages.find(x=>x.id===id); if(m) { m.c = c; saveRooms(); renderMessages(); if(m.show) broadcastState(); } }
    function toggleMsgStyle(id, prop) { let m = currentRoom.messages.find(x=>x.id===id); if(m) { m[prop] = !m[prop]; saveRooms(); renderMessages(); if(m.show) broadcastState(); } }
    function cloneMsg(id) { let m = currentRoom.messages.find(x=>x.id===id); if(m) { let nm = JSON.parse(JSON.stringify(m)); nm.id = generateId(); nm.show = false; currentRoom.messages.push(nm); saveRooms(); renderMessages(); } }
    function delMsg(id) { if(confirm("Delete message?")) { currentRoom.messages = currentRoom.messages.filter(x=>x.id!==id); saveRooms(); renderMessages(); if(activeMessageId === id) activeMessageId = null; broadcastState(); } }

    function toggleMsgShow(id) {
        let target = currentRoom.messages.find(x=>x.id===id);
        if(!target) return;
        if(target.show) { target.show = false; activeMessageId = null; } 
        else { currentRoom.messages.forEach(m => m.show = false); target.show = true; activeMessageId = id; }
        saveRooms(); renderMessages(); broadcastState();
    }

    // === Dashboard Quick Controls ===
    function syncQcStep(src) {
        let val = document.getElementById('qc-step-' + src).value;
        document.getElementById('qc-step-l').value = val;
        document.getElementById('qc-step-r').value = val;
    }

    function updatePlayPauseBtn() {
        let btn = document.getElementById('btn-qc-playpause');
        if (cdIsRunning) { btn.textContent = '⏸'; btn.className = 'qc-item qc-btn-pause'; } 
        else { btn.textContent = '▶'; btn.className = 'qc-item qc-btn-play'; }
    }

    function qcPlayPause() {
        if(!currentRoom || activeTimerIndex === -1) return;
        if(cdIsRunning) { cdRemainingMs = cdTargetTime - Date.now(); cdIsRunning = false; } 
        else { if(cdRemainingMs <= 0 && currentRoom.timers[activeTimerIndex].appr==='cd') return; cdTargetTime = Date.now() + cdRemainingMs; cdIsRunning = true; }
        updatePlayPauseBtn(); broadcastState();
    }

    function qcAdjust(dir) {
        if(activeTimerIndex === -1) return;
        let stepMs = parseInt(document.getElementById('qc-step-l').value);
        let delta = stepMs * dir;
        cdRemainingMs += delta;
        if(cdRemainingMs < 0) cdRemainingMs = 0;
        if(cdIsRunning) cdTargetTime += delta;
        cdTotalMs += delta; 
        if(cdTotalMs < cdRemainingMs) cdTotalMs = cdRemainingMs;
        broadcastState();
    }
    
    function qcPrev() {
        if(activeTimerIndex > 0) goTimer(activeTimerIndex - 1);
        else if(currentRoom.timers.length > 0) goTimer(0);
    }
    function qcNext() {
        if(activeTimerIndex < currentRoom.timers.length - 1) goTimer(activeTimerIndex + 1);
        else if(currentRoom.timers.length > 0) goTimer(currentRoom.timers.length - 1);
    }

    // === Network & Broadcast ===
    function broadcastState() {
        if (!isMaster || !mqttClient || !activeRoomCode || !mqttClient.connected) return;
        let msgObj = null;
        if(activeMessageId) {
            let m = currentRoom.messages.find(x=>x.id===activeMessageId);
            if(m && m.show) msgObj = { text: m.text, color: m.c==='green'?'#00cc00':(m.c==='red'?'#ff3333':'#ffffff'), bold: m.b, caps: m.cap, mode: m.mode };
        }

        let yMs = 0, rMs = 0, appr = 'cd', fps = 24, df = false;
        if(activeTimerIndex >= 0 && currentRoom.timers[activeTimerIndex]) {
            let t = currentRoom.timers[activeTimerIndex];
            yMs = (t.ym * 60 + t.ys) * 1000; rMs = (t.rm * 60 + t.rs) * 1000;
            appr = t.appr; fps = t.fps; df = t.df;
        }

        const payload = JSON.stringify({
            masterTs: Date.now(),
            run: cdIsRunning, target: cdTargetTime, rem: cdRemainingMs, tot: cdTotalMs,
            yms: yMs, rms: rMs, msg: msgObj,
            appr: appr, fps: fps, df: df,
            blk: sysBlackout, fTs: lastFlashTs
        });
        mqttClient.publish(`matc/v6/room_${activeRoomCode}/state`, payload, { qos: 0, retain: true });
    }

    function slaveConnect() {
        let code = document.getElementById('slave-room-code').value.trim();
        if(code.length !== 5) return;
        activeRoomCode = code;
        document.getElementById('slave-login').style.display = 'none';
        document.getElementById('slave-content').style.display = 'flex';
        
        mqttClient.subscribe(`matc/v6/room_${activeRoomCode}/state`);
        if(heartbeatInt) clearInterval(heartbeatInt);
        heartbeatInt = setInterval(() => { if(mqttClient && mqttClient.connected) mqttClient.publish(`matc/v6/room_${activeRoomCode}/heartbeat`, JSON.stringify({ id: myId, name: myName })); }, 2000);
    }

    let lastState = null;
    function handleMqttMessage(topic, message) {
        try {
            const data = JSON.parse(message.toString());
            if (isMaster && topic.endsWith('/heartbeat')) {
                connectedClients[data.id] = { name: data.name, lastSeen: Date.now() }; renderClientList();
            }
            if (!isMaster && topic.endsWith('/state')) {
                clockOffset = data.masterTs - Date.now();
                cdIsRunning = data.run; cdTargetTime = data.target; cdRemainingMs = data.rem; cdTotalMs = data.tot;
                if(data.fTs !== lastFlashTs) { lastFlashTs = data.fTs; playFlashAnimation(); }
                lastState = data; 
            }
        } catch(e) {}
    }

    function renderClientList() {
        if(!isMaster) return;
        const now = Date.now();
        let html = ''; let count = 0;
        for (const id in connectedClients) {
            if (now - connectedClients[id].lastSeen > 4000) delete connectedClients[id]; 
            else { html += `<div class="client-item"><span class="status-dot led active" style="display:inline-block;"></span> ${connectedClients[id].name}</div>`; count++; }
        }
        document.getElementById('m-client-list').innerHTML = html;
        document.getElementById('m-client-count').textContent = count;
    }

    // === Rendering Engine (30ms) ===
    setInterval(() => {
        let now = Date.now() + clockOffset;
        let ms = cdRemainingMs;
        if (cdIsRunning) ms = cdTargetTime - now; 
        if (ms < 0 && !cdIsRunning) ms = cdRemainingMs; 

        let yMs = 0, rMs = 0, msg = null, appr = 'cd', fps = 24, df = false, blk = false;
        if (isMaster && currentRoom) {
            if(activeTimerIndex >= 0 && currentRoom.timers[activeTimerIndex]) {
                let t = currentRoom.timers[activeTimerIndex];
                yMs = (t.ym * 60 + t.ys) * 1000; rMs = (t.rm * 60 + t.rs) * 1000;
                appr = t.appr; fps = t.fps; df = t.df;
            }
            if(activeMessageId) {
                let m = currentRoom.messages.find(x=>x.id===activeMessageId);
                if(m && m.show) msg = { text: m.text, color: m.c==='green'?'#00cc00':(m.c==='red'?'#ff3333':'#ffffff'), bold: m.b, caps: m.cap, mode: m.mode };
            }
            blk = sysBlackout;
        } else if (!isMaster && lastState) {
            yMs = lastState.yms; rMs = lastState.rms; msg = lastState.msg;
            appr = lastState.appr; fps = lastState.fps; df = lastState.df; blk = lastState.blk;
        }

        let timeStr = renderTimeText(appr, ms, cdTotalMs, fps, df);

        if(isMaster && currentRoom) {
            let mTime = document.getElementById('m-prev-time');
            let mProgBg = document.getElementById('m-prog-bg');
            let mProgFill = document.getElementById('m-prog-fill');
            let mProgMarker = document.getElementById('m-prog-marker');
            let mProgMarkerTime = document.getElementById('m-prog-marker-time');
            let mMsgBot = document.getElementById('m-prev-msg-bot');
            let mMsgFs = document.getElementById('m-prev-msg-fs');

            applyStyleAndProgress(ms, cdTotalMs, yMs, rMs, mTime, mProgBg, mProgFill, mProgMarker, mProgMarkerTime, timeStr);
            applyMessageUI(msg, mTime, mMsgBot, mMsgFs);
            document.getElementById('master-preview-box').style.opacity = blk ? '0' : '1';
            applyPreviewScale();
        }

        if(!isMaster && activeRoomCode) {
            let sTime = document.getElementById('s-time');
            let sProgBg = document.getElementById('s-prog-bg');
            let sProgFill = document.getElementById('s-prog-fill');
            let sMsgBot = document.getElementById('s-msg-bot');
            let sMsgFs = document.getElementById('s-msg-fs');

            applyStyleAndProgress(ms, cdTotalMs, yMs, rMs, sTime, sProgBg, sProgFill, null, null, timeStr);
            applyMessageUI(msg, sTime, sMsgBot, sMsgFs);
            document.getElementById('slave-content').style.opacity = blk ? '0' : '1';
            applySlaveScale();
        }
    }, 30);

    function getSystemToD() {
        let d = new Date();
        return pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds()) + ":" + pad(Math.floor(d.getMilliseconds()/10));
    }

    function framesToSMPTE(totalFrames, fps, isDF) {
        let f, s, m, h; let fpsInt = Math.round(fps);
        if (isDF) {
            let dropFrames = 2; let framesPer10Min = 17982; let framesPerMin = 1798;
            let d = Math.floor(totalFrames / framesPer10Min); let rem = totalFrames % framesPer10Min;
            let count = 0; if (rem > dropFrames) count = Math.floor((rem - dropFrames) / framesPerMin);
            let actualFrames = totalFrames + (9 * dropFrames * d) + (dropFrames * count);
            f = actualFrames % fpsInt; s = Math.floor(actualFrames / fpsInt) % 60;
            m = Math.floor(actualFrames / (fpsInt * 60)) % 60; h = Math.floor(actualFrames / (fpsInt * 3600)) % 24;
        } else {
            f = totalFrames % fpsInt; s = Math.floor(totalFrames / fpsInt) % 60;
            m = Math.floor(totalFrames / (fpsInt * 60)) % 60; h = Math.floor(totalFrames / (fpsInt * 3600)) % 24;
        }
        return `${pad(h)}:${pad(m)}:${pad(s)}${isDF ? ';' : ':'}${pad(f)}`;
    }

    function renderTimeText(appr, ms, tot, fps, df) {
        let isOvertime = ms <= 0; let absMs = Math.abs(ms);
        let totalSec = isOvertime ? Math.floor(absMs / 1000) : Math.ceil(absMs / 1000);
        let cdStr = (isOvertime && tot > 0 ? "+" : "") + `${pad(Math.floor(totalSec/3600))}:${pad(Math.floor((totalSec%3600)/60))}:${pad(totalSec%60)}`;
        if(tot === 0 && ms === 0 && !cdIsRunning) cdStr = "00:00:00"; 
        if(cdStr.startsWith("00:")) cdStr = cdStr.substring(3); 

        let elapMs = tot - ms; if(elapMs < 0) elapMs = 0;
        let eSec = Math.floor(elapMs / 1000);
        let cuStr = `${pad(Math.floor(eSec/3600))}:${pad(Math.floor((eSec%3600)/60))}:${pad(eSec%60)}`;
        if(cuStr.startsWith("00:")) cuStr = cuStr.substring(3);

        let todStr = getSystemToD();
        let tcFrames = Math.floor(elapMs / (1000/fps));
        let tcStr = framesToSMPTE(tcFrames, fps, df);

        let br = "\n"; let sub = "sub-time";
        
        switch(appr) {
            case 'cd': return cdStr;
            case 'cu': return cuStr;
            case 'tod': return todStr;
            case 'cd_tod': return cdStr + br + `<span class="${sub}">${todStr}</span>`;
            case 'cu_tod': return cuStr + br + `<span class="${sub}">${todStr}</span>`;
            case 'tc': return tcStr;
            case 'hidden': return "";
            default: return cdStr;
        }
    }

    function applyStyleAndProgress(ms, tot, yMs, rMs, timeEl, bgEl, fillEl, markerEl, markerTimeEl, textStr) {
        timeEl.innerHTML = textStr;
        
        let pct = 0;
        if(tot > 0 && ms > 0) pct = (ms / tot) * 100;
        if(pct > 100) pct = 100;
        
        let yPct = 0, rPct = 0;
        if(tot > 0) { yPct = (yMs / tot) * 100; rPct = (rMs / tot) * 100; }
        
        // Progress bar background from Green to Yellow to Red (Left to Right)
        bgEl.style.background = `linear-gradient(to right, var(--accent-green) 0%, var(--accent-green) ${100-yPct}%, var(--accent-yellow) ${100-yPct}%, var(--accent-yellow) ${100-rPct}%, var(--accent-red) ${100-rPct}%, var(--accent-red) 100%)`;
        
        // Depleting from left to right -> black mask starts on left and grows.
        let maskWidth = 100 - pct;
        fillEl.style.width = maskWidth + '%';
        
        if (markerEl && markerTimeEl) {
            if (tot === 0) { markerEl.style.display = 'none'; }
            else {
                markerEl.style.display = 'block';
                markerEl.style.left = maskWidth + '%';
                let tSec = Math.ceil(Math.abs(ms) / 1000);
                markerTimeEl.textContent = `${pad(Math.floor(tSec/60))}:${pad(tSec%60)}`;
            }
        }

        if (ms === 0 && tot === 0 && !cdIsRunning) {
            timeEl.style.color = 'var(--accent-green)';
            return;
        }
        let isOvertime = ms <= 0;
        if (ms <= rMs) timeEl.style.color = 'var(--accent-red)';
        else if (ms <= yMs) timeEl.style.color = 'var(--accent-yellow)';
        else timeEl.style.color = 'var(--accent-green)';
    }

    function applyMessageUI(msg, timeEl, msgBot, msgFs) {
        if(!msg) { timeEl.style.display = 'block'; msgBot.style.display = 'none'; msgFs.style.display = 'none'; return; }
        let fText = msg.caps ? msg.text.toUpperCase() : msg.text; let fw = msg.bold ? 'bold' : 'normal';
        if(msg.mode === 'fullscreen') {
            timeEl.style.display = 'none'; msgBot.style.display = 'none'; msgFs.style.display = 'flex';
            msgFs.textContent = fText; msgFs.style.color = msg.color; msgFs.style.fontWeight = fw;
        } else {
            timeEl.style.display = 'block'; msgFs.style.display = 'none'; msgBot.style.display = 'block';
            msgBot.textContent = fText; msgBot.style.color = msg.color; msgBot.style.fontWeight = fw;
        }
    }

    // === UI Listeners & Scale ===
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.dropdown')) { document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show')); }
    });

    function setupResizers() {
        const ws = document.getElementById('workspace');
        const pLeft = document.getElementById('panel-left'); const pMid = document.getElementById('panel-mid'); const pRight = document.getElementById('panel-right');
        const rLM = document.getElementById('resizer-lm'); const rMR = document.getElementById('resizer-mr');
        let isResizing = false, cur = null;

        rLM.addEventListener('mousedown', () => { isResizing = true; cur = 'LM'; rLM.classList.add('dragging'); });
        rMR.addEventListener('mousedown', () => { isResizing = true; cur = 'MR'; rMR.classList.add('dragging'); });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing || window.innerWidth <= 1024) return;
            let wsRect = ws.getBoundingClientRect(); let pX = ((e.clientX - wsRect.left) / wsRect.width) * 100;
            if (cur === 'LM' && pX > 10 && pX < 80) { let oldLeft = parseFloat(pLeft.style.width || "16.66"); pLeft.style.width = pX + "%"; pMid.style.width = (parseFloat(pMid.style.width || "50") - (pX - oldLeft)) + "%"; } 
            else if (cur === 'MR' && pX > 20 && pX < 90) { pMid.style.width = (pX - parseFloat(pLeft.style.width || "16.66")) + "%"; pRight.style.width = (100 - pX) + "%"; }
            applyPreviewScale(); 
        });

        document.addEventListener('mouseup', () => { isResizing = false; cur = null; rLM.classList.remove('dragging'); rMR.classList.remove('dragging'); });
    }

    function applyPreviewScale() {
        if(!isMaster || !currentRoom) return;
        const box = document.getElementById('master-preview-box'); const wrap = document.getElementById('master-preview-scale');
        wrap.style.transform = 'none'; let rB = box.getBoundingClientRect(); let rW = wrap.getBoundingClientRect();
        if(rW.width === 0) return; wrap.style.transform = `scale(${Math.min((rB.width*0.9)/rW.width, (rB.height*0.9)/rW.height)})`;
    }

    function applySlaveScale() {
        if(isMaster || !activeRoomCode) return;
        const stretch = document.getElementById('slave-stretch');
        if(document.fullscreenElement || document.webkitFullscreenElement || isFakeFullscreen) {
            stretch.style.transform = 'none'; let rW = stretch.offsetWidth; let rH = stretch.offsetHeight;
            stretch.style.transform = `scale(${Math.min((window.innerWidth/rW)*0.85, (window.innerWidth*0.95)/rW, (window.innerHeight*0.85)/rH)})`;
        } else stretch.style.transform = 'none';
    }

    window.addEventListener('resize', () => { applyPreviewScale(); applySlaveScale(); });

    const globalFsBtn = document.getElementById('global-fs-btn'); let isFakeFullscreen = false;
    globalFsBtn.addEventListener('click', () => {
        let container = isMaster ? document.getElementById('master-preview-box') : document.getElementById('slave-content');
        if (!document.fullscreenElement && !isFakeFullscreen) {
            if (container.requestFullscreen) container.requestFullscreen().catch(()=> { isFakeFullscreen=true; container.style.position='fixed'; container.style.inset=0; container.style.zIndex=9999; });
            else { isFakeFullscreen=true; container.style.position='fixed'; container.style.inset=0; container.style.zIndex=9999; }
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else { isFakeFullscreen=false; container.style.position='relative'; container.style.zIndex='auto'; }
        }
    });

</script>
</body>
