<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pro Network TimeCode (Max Display Edition)</title>

<!-- 匯入 7段 LED 顯示器專用字體 -->
<link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
<!-- 匯入 MQTT.js 網路通訊套件 -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
    body {
        font-family: 'Consolas', 'Courier New', Courier, monospace;
        background-color: #0a0a0a;
        color: #00ff00; 
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        user-select: none; 
        overflow: hidden; 
    }

    /* === 開機設備選擇畫面 === */
    #welcomeScreen {
        position: fixed; inset: 0; background-color: #001a33; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff;
    }
    #welcomeScreen h1 { font-size: 2.5rem; margin-bottom: 10px; color: #ffcc00; letter-spacing: 2px; text-align: center;}
    #welcomeScreen p { font-size: 1.2rem; color: #aaa; margin-bottom: 20px; text-align: center; padding: 0 20px;}
    
    .name-input-box { margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .name-input-box input {
        font-size: 1.5rem; padding: 10px 20px; background-color: #000; color: #00ff00;
        border: 2px solid #00aaff; border-radius: 8px; text-align: center; width: 250px; outline: none;
    }

    .device-btns { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .device-btns button {
        padding: 15px 30px; font-size: 1.3rem; background: #002244; color: #cccccc;
        border: 2px solid #555555; border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: bold;
    }
    .device-btns button:hover { background: #00aaff; color: #000; border-color: #00aaff; }

    /* === 頂部網路與角色面板 === */
    .network-panel {
        background: #002244; padding: 15px 25px; border: 1px solid #003366; border-top: 3px solid #ffcc00;
        box-shadow: 0 4px 10px rgba(0,0,0,0.8); display: flex; align-items: flex-start; gap: 30px;
        z-index: 10; justify-content: center; margin-bottom: 20px; transition: all 0.3s;
    }
    
    .panel-section { display: flex; flex-direction: column; gap: 10px; }
    .panel-row { display: flex; align-items: center; gap: 10px; }

    label, span.gray-text { font-size: 1.1rem; font-weight: bold; letter-spacing: 1px; color: #aaaaaa; }
    .highlight { color: #ffcc00; font-size: 1.2rem;}
    .device-name-display { color: #00aaff; font-size: 1.2rem; font-weight: bold; }
    
    select, input[type="text"], input[type="number"] {
        font-size: 1.1rem; padding: 5px 10px; background-color: #001a33; color: #cccccc; 
        border: 1px solid #555555; font-family: inherit; font-weight: bold; outline: none;
    }
    
    /* === 螢幕顯示區 === */
    .display-container {
        position: relative; background-color: #000; padding: 40px 80px; border: 2px solid #333;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: all 0.3s; margin-bottom: 20px; width: 90%; max-width: 1600px;
    }

    .stretch-wrapper {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transform-origin: center center; width: 100%;
    }

    /* 字體巨量化：保留 20rem */
    .time-text {
        font-family: 'Digital-7 Mono', sans-serif; font-size: 20rem; letter-spacing: 2px;
        white-space: nowrap; color: #00ff00; line-height: 0.9; transition: color 0.3s;
    }
    
    /* 超時紅字發光狀態 */
    .time-text.overtime {
        color: #ff3333 !important;
        text-shadow: 0 0 35px rgba(255, 51, 51, 1), 0 0 15px rgba(255, 51, 51, 0.8) !important;
    }

    /* === 倒數計時進度條設計 === */
    .progress-container {
        position: absolute; bottom: 0; left: 0; width: 100%; height: 35px; 
        background-color: #111; display: none; justify-content: flex-end; 
        box-shadow: inset 0 5px 10px rgba(0,0,0,0.8); z-index: 10; border-top: 2px solid #333;
    }
    .progress-bar {
        height: 100%; width: 100%; background-color: #00ff00;
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
        transition: width 0.1s linear, background-color 0.5s;
    }
    /* 20%~5%：黃色 */
    .progress-bar.warning { background-color: #ffcc00; box-shadow: 0 0 15px rgba(255, 204, 0, 0.6); }
    /* 5%~0%：紅色 */
    .progress-bar.danger { background-color: #ff3333; box-shadow: 0 0 15px rgba(255, 51, 51, 0.6); }

    /* === 全螢幕閃爍動畫 === */
    @keyframes flashBg {
        0%, 100% { background-color: #000; }
        50% { background-color: #ff3333; }
    }
    @keyframes flashText {
        0%, 100% { color: #ff3333; text-shadow: 0 0 25px rgba(255, 51, 51, 0.9); }
        50% { color: #000000 !important; text-shadow: none !important; }
    }
    .flash-active { animation: flashBg 0.5s 2; }
    .flash-active .time-text { animation: flashText 0.5s 2 !important; }

    .user-bits { font-family: 'Digital-7 Mono', sans-serif; font-size: 4rem; color: #00cc00; letter-spacing: 5px; margin-top: 15px; }

    .fullscreen-btn {
        position: absolute; top: 10px; right: 10px; background: transparent; color: #555;
        border: 1px solid #555; padding: 5px 10px; cursor: pointer; font-size: 1rem; font-family: inherit; font-weight: bold; z-index: 20;
    }
    .fullscreen-btn:hover { color: #00ff00; border-color: #00ff00; }

    .display-container:fullscreen { width: 100vw; height: 100vh; padding: 0; border: none; background-color: #000; display: flex; align-items: center; justify-content: center; }
    .fake-fullscreen {
        position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 9999 !important;
        background-color: #000 !important; border: none !important; margin: 0 !important; padding: 0 !important; display: flex !important; align-items: center !important; justify-content: center !important;
    }

    /* === 控台按鈕區 === */
    .controls-panel {
        display: flex; gap: 15px; min-height: 60px; align-items: center; background: #002244;
        padding: 15px 25px; border: 1px solid #003366; box-shadow: 0 5px 15px rgba(0,0,0,0.8); z-index: 10;
    }
    .control-group { display: none; gap: 15px; align-items: center; }
    .control-group.active { display: flex; }

    button.cmd-btn { padding: 8px 18px; font-size: 1.2rem; border: 2px solid #555; background-color: #001a33; color: #cccccc; font-family: inherit; font-weight: bold; text-transform: uppercase; cursor: pointer; }
    button.cmd-btn:active { background-color: #cccccc; color: #001a33; }
    button.play-btn { border-color: #00ff00; color: #00ff00; }
    button.stop-btn { border-color: #ff3333; color: #ff3333; }
    button.reset-btn { border-color: #ffcc00; color: #ffcc00; }
    
    .client-list-box { width: 250px; height: 80px; background: #001a33; border: 1px solid #555; overflow-y: auto; padding: 5px; font-size: 0.9rem; color: #cccccc; }
    .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background-color: #ff3333; margin-right: 5px; }
    .status-dot.online { background-color: #00ff00; }

    #mainUI { display: none; flex-direction: column; align-items: center; width: 100%; }

    /* RWD 適應隱藏 (平板與手機共用最佳化版面) */
    body.device-tablet .controls-panel, 
    body.device-tablet .master-only, 
    body.device-desktop .slave-only { display: none !important; }

    body.device-tablet .network-panel { flex-direction: column; align-items: center; padding: 15px; gap: 15px; width: 90%; max-width: 400px; border-top: 3px solid #00aaff;}
    body.device-tablet .panel-row label { display: none; }
    body.device-tablet input#joinCodeInput { width: 120px; font-size: 1.5rem; text-align: center; }
    body.device-tablet button#joinBtn { padding: 10px 20px; font-size: 1.2rem; }
    body.device-tablet .display-container { border: none; padding: 0; width: 100vw; height: 50vh; margin-top: 20px; }
    
    body.device-tablet .time-text { font-size: 30vw; } 
    body.device-tablet .user-bits { font-size: 7vw; }

</style>
</head>
<body>

    <div id="welcomeScreen">
        <h1>NTP TIMECODE SYNC</h1>
        <p>請輸入此裝置名稱，並選擇裝置類型</p>
        <div class="name-input-box">
            <input type="text" id="welcomeName" placeholder="例如：導播電腦 / 攝影師手機">
        </div>
        <div class="device-btns">
            <button onclick="initSystem('desktop')">💻 電腦 (主控發送端)</button>
            <button onclick="initSystem('tablet')">📱 平板／手機 (純顯示接收)</button>
        </div>
    </div>

    <div id="mainUI">
        <div class="network-panel">
            <div class="panel-section">
                <div class="panel-row">
                    <span class="status-dot" id="netStatus"></span>
                    <span class="gray-text" id="myRoleText">NETWORK</span>
                </div>
                <div class="panel-row">
                    <label>NAME:</label>
                    <span class="device-name-display" id="displayMyName">Unknown</span>
                </div>
                <div class="panel-row slave-only">
                    <input type="text" id="joinCodeInput" placeholder="輸入5碼房間代碼" maxlength="5">
                    <button class="cmd-btn" id="joinBtn" style="border-color:#00aaff; color:#00aaff;">CONNECT</button>
                </div>
            </div>

            <div class="panel-section master-only">
                <div class="panel-row">
                    <label>ROOM CODE:</label>
                    <span class="highlight" id="roomCodeDisplay">Generating...</span>
                </div>
                <div class="panel-row">
                    <label>MODE:</label>
                    <!-- 預設選擇現在時間 (System Clock) -->
                    <select id="mainMode">
                        <option value="clock" selected>SYSTEM CLOCK</option>
                        <option value="countdown">COUNTDOWN TIMER</option>
                        <option value="timecode">SMPTE TIMECODE</option>
                    </select>
                </div>
            </div>

            <div class="panel-section master-only">
                <label>CONNECTED DEVICES: <span id="clientCount" style="color:#ccc;">0</span></label>
                <div class="client-list-box" id="clientListBox"></div>
            </div>
        </div>

        <div class="display-container" id="displayContainer">
            <button class="fullscreen-btn" id="fsBtn">[ FULLSCREEN ]</button>
            <div class="stretch-wrapper" id="stretchWrapper">
                <div class="time-text" id="timeDisplay">--:--:--</div>
                <div class="user-bits" id="userBitsDisplay" style="display: none;">UB: 00 00 00 00</div>
            </div>
            <!-- 進度條 -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <div class="controls-panel">
            <div class="control-group active" id="ctrl-clock">
                <label>>>> SYNC WITH SYSTEM NTP CLOCK <<<</label>
            </div>

            <!-- 新增獨立 SET 按鈕的倒數計時控制面板 -->
            <div class="control-group" id="ctrl-countdown">
                <input type="number" id="cdMin" min="0" value="0" style="width:50px;"><label>MIN</label>
                <input type="number" id="cdSec" min="0" max="59" value="0" style="width:50px;"><label>SEC</label>
                <button id="cdSet" class="cmd-btn" style="border-color:#00aaff; color:#00aaff;">SET</button>
                <button id="cdStart" class="cmd-btn play-btn">GO</button>
                <button id="cdStop" class="cmd-btn stop-btn">HALT</button>
                <button id="cdReset" class="cmd-btn reset-btn">CLEAR</button>
            </div>

            <div class="control-group" id="ctrl-timecode">
                <label>FPS:</label>
                <select id="fpsSelect">
                    <option value="24">24</option>
                    <option value="25">25</option>
                    <option value="30">30 (NDF)</option>
                    <option value="29.97">29.97 (DF)</option>
                </select>
                <button id="tcStart" class="cmd-btn play-btn">PLAY</button>
                <button id="tcStop" class="cmd-btn stop-btn">STOP</button>
                <button id="tcReset" class="cmd-btn reset-btn">RESET</button>
                <label style="margin-left: 20px;">USER BITS:</label>
                <input type="text" id="ubInput" value="20260423" maxlength="8">
            </div>
        </div>
    </div>

<script>
    let isMaster = true;
    let myDeviceType = 'desktop';
    let myDeviceName = 'Unknown';
    const myDeviceId = 'dev_' + Math.random().toString(36).substr(2, 6);

    function initSystem(deviceType) {
        let nameInput = document.getElementById('welcomeName').value.trim();
        myDeviceType = deviceType;
        isMaster = (deviceType === 'desktop');
        
        if (nameInput !== "") myDeviceName = nameInput;
        else myDeviceName = (isMaster ? "MASTER-" : "SLAVE-") + myDeviceId.substring(4).toUpperCase();

        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('mainUI').style.display = 'flex';
        document.body.className = `device-${deviceType}`;
        
        document.getElementById('myRoleText').textContent = isMaster ? "MASTER (主控端)" : "SLAVE (接收端)";
        document.getElementById('displayMyName').textContent = myDeviceName;

        connectNetwork();
    }

    function pad(num) { return num.toString().padStart(2, '0'); }

    let currentMode = 'clock'; 
    let tcIsRunning = false; let tcBaseTime = 0; let tcAccumulatedMs = 0;
    let fps = 24; let isDropFrame = false;

    let cdIsRunning = false;
    let cdTargetTime = 0;
    let cdRemainingMs = 0;
    let cdTotalMs = 0; 

    let clockOffset = 0; 
    let hasFlashed = false; 

    function getSyncedTime() { return Date.now() + clockOffset; }

    const displayContainer = document.getElementById('displayContainer');
    const timeDisplay = document.getElementById('timeDisplay');
    const userBitsDisplay = document.getElementById('userBitsDisplay');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const ubInput = document.getElementById('ubInput');
    
    function msToTimeCode(ms, frameRate, isDF) {
        let totalFrames = isDF ? Math.floor(ms / (1000 / 29.97)) : Math.floor(ms / (1000 / frameRate));
        let h, m, s, f; let fpsInt = (frameRate === 29.97) ? 30 : Math.round(frameRate);

        if (isDF) {
            let dropFrames = 2; let framesPer10Min = 17982; let framesPerMin = 1798;
            let d = Math.floor(totalFrames / framesPer10Min); let rem = totalFrames % framesPer10Min;
            let count = 0; if (rem > dropFrames) count = Math.floor((rem - dropFrames) / framesPerMin);
            let mappedFrames = totalFrames + (9 * dropFrames * d) + (dropFrames * count);
            f = mappedFrames % fpsInt; s = Math.floor(mappedFrames / fpsInt) % 60;
            m = Math.floor(mappedFrames / (fpsInt * 60)) % 60; h = Math.floor(mappedFrames / (fpsInt * 3600)) % 24;
        } else {
            f = totalFrames % fpsInt; s = Math.floor(totalFrames / fpsInt) % 60;
            m = Math.floor(totalFrames / (fpsInt * 60)) % 60; h = Math.floor(totalFrames / (fpsInt * 3600)) % 24;
        }
        return `${pad(h)}:${pad(m)}:${pad(s)}${isDF ? ';' : ':'}${pad(f)}`;
    }

    setInterval(() => {
        let now = getSyncedTime(); 

        if (currentMode === 'timecode') {
            progressContainer.style.display = 'none';
            timeDisplay.classList.remove('overtime');
            
            let elapsedMs = tcAccumulatedMs;
            if (tcIsRunning) elapsedMs += (now - tcBaseTime);
            timeDisplay.textContent = msToTimeCode(elapsedMs, fps, isDropFrame);
            
            if (isMaster) {
                let val = ubInput.value.padEnd(8, '0').toUpperCase(); 
                userBitsDisplay.textContent = `UB: ${val.match(/.{1,2}/g).join(' ')}`;
            }
            userBitsDisplay.style.display = 'block';

        } else if (currentMode === 'countdown') {
            userBitsDisplay.style.display = 'none';
            progressContainer.style.display = 'flex'; 

            let ms = cdRemainingMs;
            if (cdIsRunning) ms = cdTargetTime - now; 
            
            // CLEAR 觸發後，這段邏輯會強制畫面顯示綠色的 00:00 與空進度條
            if (ms === 0 && cdTotalMs === 0 && !cdIsRunning) {
                timeDisplay.textContent = "00:00";
                timeDisplay.classList.remove('overtime');
                progressBar.style.width = '0%';
                progressBar.className = 'progress-bar';
                return;
            }

            let isOvertime = ms <= 0;
            let absMs = Math.abs(ms);
            
            if (ms > 0) hasFlashed = false;
            
            let totalSec = isOvertime ? Math.floor(absMs / 1000) : Math.ceil(absMs / 1000);
            timeDisplay.textContent = (isOvertime ? "+" : "") + `${pad(Math.floor(totalSec / 60))}:${pad(totalSec % 60)}`;
            
            if (isOvertime && cdIsRunning && !hasFlashed) {
                hasFlashed = true;
                displayContainer.classList.add('flash-active');
                setTimeout(() => {
                    displayContainer.classList.remove('flash-active');
                }, 1000); 
            }

            if (isOvertime) {
                timeDisplay.classList.add('overtime');
                progressBar.style.width = '0%';
                progressBar.className = 'progress-bar danger';
            } else {
                timeDisplay.classList.remove('overtime');
                
                if (cdTotalMs > 0) {
                    let percent = (ms / cdTotalMs) * 100;
                    progressBar.style.width = percent + '%';
                    
                    if (percent <= 5) {
                        progressBar.className = 'progress-bar danger';
                    } else if (percent <= 20) {
                        progressBar.className = 'progress-bar warning';
                    } else {
                        progressBar.className = 'progress-bar';
                    }
                }
            }

        } else if (currentMode === 'clock') {
            progressContainer.style.display = 'none';
            userBitsDisplay.style.display = 'none';
            timeDisplay.classList.remove('overtime');
            
            let sysNow = new Date(now); 
            let h = sysNow.getHours(); let m = sysNow.getMinutes();
            let s = sysNow.getSeconds(); let ms = Math.floor(sysNow.getMilliseconds() / 10);
            timeDisplay.textContent = `${pad(h)}:${pad(m)}:${pad(s)}.${pad(ms)}`;
        }
    }, 30);

    const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt'; 
    let mqttClient = null;
    let currentRoomCode = '';
    let connectedClients = {}; 
    let heartbeatInterval = null;

    function connectNetwork() {
        if(mqttClient) mqttClient.end();
        mqttClient = mqtt.connect(MQTT_BROKER);

        mqttClient.on('connect', () => {
            document.getElementById('netStatus').classList.add('online');
            if (isMaster) {
                currentRoomCode = Math.floor(10000 + Math.random() * 90000).toString();
                document.getElementById('roomCodeDisplay').textContent = currentRoomCode;
                mqttClient.subscribe(`matc/room_${currentRoomCode}/heartbeat`);
            }
        });

        mqttClient.on('error', () => document.getElementById('netStatus').classList.remove('online'));
        mqttClient.on('close', () => document.getElementById('netStatus').classList.remove('online'));

        mqttClient.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                if (isMaster && topic.endsWith('/heartbeat')) {
                    connectedClients[data.id] = { name: data.name, type: data.type, lastSeen: Date.now() };
                    renderClientList();
                }
                if (!isMaster && topic.endsWith('/state')) {
                    if (data.masterTimestamp) clockOffset = data.masterTimestamp - Date.now();

                    if (currentMode !== data.mode) {
                        currentMode = data.mode;
                        applyStretch(); 
                    }

                    if(data.mode === 'timecode') {
                        fps = data.fps; isDropFrame = (fps === 29.97);
                        tcIsRunning = data.tcIsRunning; tcBaseTime = data.tcBaseTime; tcAccumulatedMs = data.tcAccumulatedMs;
                        if(data.ub) userBitsDisplay.textContent = data.ub;
                    } else if(data.mode === 'countdown') {
                        cdIsRunning = data.cdIsRunning; cdTargetTime = data.cdTargetTime; cdRemainingMs = data.cdRemainingMs;
                        if (data.cdTotalMs !== undefined) cdTotalMs = data.cdTotalMs;
                    }
                }
            } catch(e) {}
        });
    }

    function broadcastState() {
        if (isMaster && mqttClient && currentRoomCode && mqttClient.connected) {
            const payload = JSON.stringify({
                masterTimestamp: Date.now(),
                mode: currentMode, fps: fps,
                tcIsRunning: tcIsRunning, tcBaseTime: tcBaseTime, tcAccumulatedMs: tcAccumulatedMs,
                cdIsRunning: cdIsRunning, cdTargetTime: cdTargetTime, cdRemainingMs: cdRemainingMs,
                cdTotalMs: cdTotalMs, 
                ub: userBitsDisplay.textContent
            });
            mqttClient.publish(`matc/room_${currentRoomCode}/state`, payload, { qos: 0 });
        }
    }

    setInterval(() => { if(isMaster) broadcastState(); }, 1500);

    function renderClientList() {
        const now = Date.now();
        let html = ''; let count = 0;
        for (const id in connectedClients) {
            if (now - connectedClients[id].lastSeen > 4000) delete connectedClients[id]; 
            else {
                let icon = connectedClients[id].type === 'tablet' ? '📱' : '📟';
                html += `<div class="client-item">${icon} ${connectedClients[id].name}</div>`;
                count++;
            }
        }
        document.getElementById('clientListBox').innerHTML = html;
        document.getElementById('clientCount').textContent = count;
    }

    document.getElementById('joinBtn').addEventListener('click', () => {
        const code = document.getElementById('joinCodeInput').value.trim();
        if (code.length !== 5) { alert("請輸入主控台畫面上顯示的 5 位數代碼！"); return; }
        
        currentRoomCode = code;
        mqttClient.subscribe(`matc/room_${currentRoomCode}/state`);
        timeDisplay.textContent = "SYNCING...";
        
        if(heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
            if(mqttClient && mqttClient.connected) {
                mqttClient.publish(`matc/room_${currentRoomCode}/heartbeat`, JSON.stringify({ 
                    id: myDeviceId, type: myDeviceType, name: myDeviceName 
                }));
            }
        }, 2000);
    });

    // ==========================================
    // 4. 控制面板事件 (加入獨立 SET 邏輯)
    // ==========================================
    document.getElementById('mainMode').addEventListener('change', (e) => {
        if(!isMaster) return;
        currentMode = e.target.value; tcIsRunning = false; cdIsRunning = false; 
        document.querySelectorAll('.control-group').forEach(el => el.classList.remove('active'));
        document.getElementById('ctrl-' + currentMode).classList.add('active');
        applyStretch(); 
        broadcastState();
    });

    document.getElementById('tcStart').addEventListener('click', () => {
        if(tcIsRunning || !isMaster) return;
        tcBaseTime = Date.now(); tcIsRunning = true; broadcastState();
    });
    document.getElementById('tcStop').addEventListener('click', () => {
        if(!tcIsRunning || !isMaster) return;
        tcAccumulatedMs += (Date.now() - tcBaseTime); tcIsRunning = false; broadcastState();
    });
    document.getElementById('tcReset').addEventListener('click', () => {
        if(!isMaster) return;
        tcIsRunning = false; tcAccumulatedMs = 0; tcBaseTime = Date.now(); broadcastState();
    });
    document.getElementById('fpsSelect').addEventListener('change', (e) => {
        if(!isMaster) return;
        fps = parseFloat(e.target.value); isDropFrame = (fps === 29.97);
        tcIsRunning = false; tcAccumulatedMs = 0; broadcastState();
    });
    ubInput.addEventListener('input', () => { if(isMaster) broadcastState(); });

    // --- 倒數計時專用按鈕邏輯 ---

    // SET 按鈕：純粹設定時間，不開始跑
    document.getElementById('cdSet').addEventListener('click', () => {
        if(!isMaster) return;
        cdIsRunning = false; 
        cdRemainingMs = ((parseInt(document.getElementById('cdMin').value)||0)*60 + parseInt(document.getElementById('cdSec').value)||0) * 1000;
        cdTotalMs = cdRemainingMs; 
        broadcastState();
    });

    // GO 按鈕：純粹開始計時，從目前的 cdRemainingMs 往下扣
    document.getElementById('cdStart').addEventListener('click', () => {
        if(cdIsRunning || !isMaster) return;
        if(cdRemainingMs <= 0) return; // 如果時間是0或小於0，不給跑
        cdTargetTime = Date.now() + cdRemainingMs; 
        cdIsRunning = true; 
        broadcastState();
    });

    document.getElementById('cdStop').addEventListener('click', () => {
        if(!cdIsRunning || !isMaster) return;
        cdRemainingMs = cdTargetTime - Date.now(); 
        cdIsRunning = false; 
        broadcastState();
    });

    // CLEAR 按鈕：完全歸零
    document.getElementById('cdReset').addEventListener('click', () => {
        if(!isMaster) return;
        cdIsRunning = false; 
        cdRemainingMs = 0; 
        cdTotalMs = 0; 
        broadcastState();
    });

    // ==========================================
    // 5. 雙重全螢幕處理 (全模式統一安全極限防護)
    // ==========================================
    const stretchWrapper = document.getElementById('stretchWrapper');
    const fsBtn = document.getElementById('fsBtn');
    let isFakeFullscreen = false;

    function applyStretch() {
        if (document.fullscreenElement || document.webkitFullscreenElement || isFakeFullscreen) {
            stretchWrapper.style.transform = 'none';
            const rect = stretchWrapper.getBoundingClientRect();
            
            // 基礎設定：以橫向為基準調整為滿版後去縮減百分之十五 (取 85%)
            let scale = (window.innerWidth / rect.width) * 0.85;
            
            // 倒數計時模式專屬放大 1.5 倍
            if (currentMode === 'countdown') {
                scale *= 1.5;
            }

            // 【全局極限安全防護】
            // 無論是哪一種模式 (Clock, Timecode 還是 Countdown)
            // 都強制限制最大寬度不可超過螢幕 95%，最大高度不可超過 85%
            let maxSafeScaleW = (window.innerWidth * 0.95) / rect.width;
            let maxSafeScaleH = (window.innerHeight * 0.85) / rect.height;
            scale = Math.min(scale, maxSafeScaleW, maxSafeScaleH);

            stretchWrapper.style.transform = `scale(${scale})`;
            fsBtn.textContent = '[ EXIT ]';
        } else {
            stretchWrapper.style.transform = 'none';
            fsBtn.textContent = '[ FULLSCREEN ]';
        }
    }

    function enableFakeFullscreen() { isFakeFullscreen = true; displayContainer.classList.add('fake-fullscreen'); applyStretch(); }
    function disableFakeFullscreen() { isFakeFullscreen = false; displayContainer.classList.remove('fake-fullscreen'); applyStretch(); }

    fsBtn.addEventListener('click', () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement && !isFakeFullscreen) {
            if (displayContainer.requestFullscreen) displayContainer.requestFullscreen().catch(() => enableFakeFullscreen());
            else if (displayContainer.webkitRequestFullscreen) displayContainer.webkitRequestFullscreen();
            else enableFakeFullscreen();
        } else {
            if (document.fullscreenElement) document.exitFullscreen();
            else if (document.webkitFullscreenElement) document.webkitExitFullscreen();
            else if (isFakeFullscreen) disableFakeFullscreen();
        }
    });
    
    document.addEventListener('fullscreenchange', applyStretch);
    document.addEventListener('webkitfullscreenchange', applyStretch);
    window.addEventListener('resize', applyStretch);

</script>
</body>
</html>
